spring.application.name=FleetSync2.0

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/fleetsync_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=aaaa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# create = drop + recreate tables on restart (use in early dev)
# update = update schema without dropping (use in mid dev)
# none = do nothing (use in production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT (added later, prepare now)
jwt.secret=fleetsync-super-secret-key-minimum-32-chars-long!!
jwt.expiration=86400000
