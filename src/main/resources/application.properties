spring.application.name=FleetSync

# OpenAI — required by Spring AI dependency (set real key when using AI features)
spring.ai.openai.api-key=<your_openai_api_key>

# MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/fleetsync
spring.datasource.username=root
spring.datasource.password=aaaa
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Auto-run schema.sql on startup
spring.sql.init.mode=always

# Disable Spring Security's default login page (we only use BCrypt from it)
spring.security.user.name=disabled

# CORS — allow React frontend on port 5173
spring.mvc.cors.allowed-origins=http://localhost:5173
spring.mvc.cors.allowed-methods=POST,GET,OPTIONS
spring.mvc.cors.allowed-headers=Content-Type
